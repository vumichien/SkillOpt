_base_: default.yaml

# Pilot: DeepSeek-chat optimizer (cloud, cheap) + local Qwen2.5-7B target (Ollama).
# Secrets (OPTIMIZER_OPENAI_API_KEY, QWEN_CHAT_*) come from the environment / .env;
# only the non-secret DeepSeek base_url is set here.

model:
  reasoning_effort: ""                       # DeepSeek-chat rejects reasoning_effort
  optimizer_backend: openai_chat
  target_backend: qwen_chat
  optimizer: deepseek-chat
  target: qwen2.5:7b-instruct-q4_K_M          # Ollama tag
  optimizer_openai_base_url: https://api.deepseek.com/v1

train:
  train_size: 100
  batch_size: 20             # 5 steps/epoch x 2 epochs = 10 steps
  num_epochs: 2
  seed: 42

gradient:
  minibatch_size: 8
  merge_batch_size: 8

optimizer:
  learning_rate: 4
  min_learning_rate: 2
  lr_scheduler: cosine
  use_slow_update: false
  use_meta_skill: false

evaluation:
  use_gate: true
  eval_test: true

env:
  name: mcqa
  skill_init: skillopt/envs/mcqa/skills/initial-weak.md   # weak init -> leaves headroom for SkillOpt to climb
  split_mode: split_dir
  split_dir: data/mcqa_csqa_split_v2   # 100 train / 100 val / 200 test - stronger gate signal
  max_turns: 1
  workers: 8                  # GPU is at <20% mean util; double rollout concurrency
