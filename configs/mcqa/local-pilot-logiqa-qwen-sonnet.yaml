# LogiQA on the Qwen2.5-7B target, Sonnet optimizer arm.
# Cross-target Sonnet cell: inherits LogiQA split + qwen2.5-7b target from local-pilot-logiqa-qwen.yaml
# and swaps only the optimizer to claude-sonnet-4-6 (Anthropic, keyed by OPTIMIZER_CLAUDE_API_KEY).
_base_: local-pilot-logiqa-qwen.yaml

model:
  optimizer: claude-sonnet-4-6
  optimizer_openai_base_url: https://api.anthropic.com/v1
  optimizer_openai_api_key_env: OPTIMIZER_CLAUDE_API_KEY
