# SocialIQA dataset, Sonnet optimizer arm (direct Anthropic API, OpenAI-compatible endpoint).
# Inherits the SocialIQA split + qwen2.5:7b target via local-pilot-siqa.yaml; swaps only the
# optimizer to claude-sonnet-4-6, pointed at Anthropic and keyed by OPTIMIZER_CLAUDE_API_KEY.
_base_: local-pilot-siqa.yaml

model:
  optimizer: claude-sonnet-4-6
  optimizer_openai_base_url: https://api.anthropic.com/v1
  optimizer_openai_api_key_env: OPTIMIZER_CLAUDE_API_KEY
