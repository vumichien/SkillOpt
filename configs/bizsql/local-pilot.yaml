_base_: ../_base_/default.yaml

# BizSQL (business Text-to-SQL) pilot: DeepSeek-V4-Pro optimizer (direct DeepSeek
# API) + local Qwen2.5-7B target (Ollama). Hyperparameters are IDENTICAL to the
# MC v3 run and the MBPP config — only the `env` block (env name, data, the new
# sql_timeout) differs, so any flat->win contrast is attributable to task family,
# not config/model/optimizer. Secrets come from .env.local-pilot.

model:
  reasoning_effort: ""                       # leave empty; DeepSeek optimizer uses its default
  optimizer_backend: openai_chat
  target_backend: qwen_chat
  optimizer: deepseek-v4-pro                   # DeepSeek arm (strong V4 tier)
  target: qwen2.5:7b-instruct-q4_K_M          # Ollama tag — unchanged from MC/MBPP runs
  optimizer_openai_base_url: https://api.deepseek.com/v1
  optimizer_openai_api_key_env: OPTIMIZER_OPENAI_API_KEY

train:
  train_size: 100
  batch_size: 20             # 5 steps/epoch x 2 epochs = 10 steps
  num_epochs: 2
  seed: 42

gradient:
  minibatch_size: 8
  merge_batch_size: 8

optimizer:
  learning_rate: 4
  min_learning_rate: 2
  lr_scheduler: cosine
  use_slow_update: false
  use_meta_skill: false

evaluation:
  use_gate: true
  eval_test: true

env:
  name: bizsql
  skill_init: skillopt/envs/bizsql/skills/initial-weak.md   # weak init -> leaves headroom for SkillOpt to climb
  split_mode: split_dir
  split_dir: data/bizsql_split_s42   # 100 train / 100 val / 200 test
  max_turns: 1
  workers: 8
  exec_timeout: 120          # per target-model call timeout (s)
  sql_timeout: 5             # per-item SQL execution timeout (s)
